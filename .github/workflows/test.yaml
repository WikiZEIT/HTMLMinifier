name: CI

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'tests/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpunit.xml'
      - 'Makefile'
      - '.github/workflows/test.yaml'
  pull_request:
    branches:
      - master
    paths:
      - 'src/**'
      - 'tests/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpunit.xml'
      - 'Makefile'
      - '.github/workflows/test.yaml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: xdebug
          tools: composer:v2
      - name: Checkout
        uses: actions/checkout@v6
      - run: make
      - run: make coverage
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  coveralls:
    needs: test
    if: github.event_name == 'push' && github.repository == 'WikiZEIT/HTMLMinifier'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: coverage-report
      - uses: coverallsapp/github-action@v2
        with:
          file: coverage.xml
